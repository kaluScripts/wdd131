<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 – Filtered Temple Album – Darlene Kalu</title>
    <meta name="description" content="A filterable, dynamically generated photo album of temples from around the world, built for WDD 131 – Dynamic Web Fundamentals by Darlene Kalu.">
    <meta name="author" content="Darlene Kalu">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Mobile-first: base styles load first, larger-view overrides live inside their own @media block -->
    <link rel="stylesheet" href="styles/filtered-temples.css">
    <link rel="stylesheet" href="styles/filtered-temples-large.css">

    <script src="scripts/filtered-temples.js" defer></script>
</head>

<body>
    <header>
        <span id="site-title">Temple Album</span>
        <nav>
            <button id="hamburger-btn" aria-label="Toggle navigation menu" aria-expanded="false">
                <span id="hamburger-icon">&#9776;</span>
            </button>
            <ul id="nav-menu">
                <li><a href="#" data-filter="all" class="filter-link active">Home</a></li>
                <li><a href="#" data-filter="old" class="filter-link">Old</a></li>
                <li><a href="#" data-filter="new" class="filter-link">New</a></li>
                <li><a href="#" data-filter="large" class="filter-link">Large</a></li>
                <li><a href="#" data-filter="small" class="filter-link">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Houses of the Lord</h1>
        <p class="intro">A growing collection of temples, filterable by age and size, which is generated dynamically from a JavaScript array.</p>

        <div class="gallery" id="temple-cards"></div>
    </main>

    <footer>
        <p>&copy;<span id="currentyear"></span> Darlene Kalu &middot; Abuja, Nigeria</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
